services:
  api-server:
    image: ghcr.io/ian-i-an/chat-server:latest
    container_name: spring-container
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      - BACKEND_HOST=api-server
      - BACKEND_PORT=8080
    depends_on:
      - api-server