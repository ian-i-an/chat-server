spring:
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: yourSimpleChatAppSecretKeyMustBeVeryLongAndSecureMoreThan64Characters1234567890
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000